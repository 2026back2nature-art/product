<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>荃富園藝有限公司｜園藝資材商品目錄</title>
  <meta name="description" content="荃富園藝有限公司商品目錄，提供園藝介質、花盆、肥料與周邊用品。">
  <style>
  :root{--forest:#183f32;--leaf:#4f765d;--cream:#f5f2e9;--paper:#fffdf7;--ink:#20312a;--line:#d9ded4}*{box-sizing:border-box}html{background:var(--cream);scroll-behavior:smooth}body{margin:0;color:var(--ink);background:radial-gradient(circle at 10% 5%,#dfe9d9 0,transparent 26rem),var(--cream);font-family:"Microsoft JhengHei",sans-serif}button,input{font:inherit}button{cursor:pointer}.header{max-width:1080px;margin:auto;padding:64px 24px 36px;display:flex;align-items:center;gap:22px}.mark{width:76px;height:76px;flex:none;border-radius:50%;background:var(--forest);color:#fff;display:grid;place-items:center;font:36px serif;box-shadow:0 10px 26px #183f3233}.eyebrow,.section-title p{margin:0 0 6px;letter-spacing:.2em;color:var(--leaf);font-size:12px;font-weight:700}h1{margin:0;color:var(--forest);font:700 clamp(30px,5vw,52px)/1.15 serif;letter-spacing:.05em}.tagline{margin:10px 0 0;color:#597066}.tools{max-width:1080px;margin:0 auto 64px;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:18px;background:#ffffffb8;border:1px solid #fff;border-radius:20px;box-shadow:0 18px 45px #34503c12}.label{display:block;margin-bottom:8px;font-size:13px;font-weight:700;color:var(--forest)}.row{display:flex}input{width:100%;border:1px solid var(--line);background:var(--paper);padding:13px 15px;outline:none;border-radius:10px}.row input{border-radius:10px 0 0 10px}.row button{border:0;padding:0 20px;color:#fff;background:var(--forest);border-radius:0 10px 10px 0}.section{max-width:1080px;margin:0 auto 72px;padding:0 24px}.section-title{margin-bottom:20px}.section-title h2{margin:0;color:var(--forest);font:700 32px/1.2 serif}.product{display:grid;grid-template-columns:minmax(270px,440px) 1fr;background:var(--paper);border-radius:28px;overflow:hidden;box-shadow:0 20px 50px #183f3215}.photo{position:relative;border:0;padding:0;background:#e5e4dc;overflow:hidden;min-height:420px}.photo img{width:100%;height:100%;max-height:520px;object-fit:cover;display:block;transition:.4s}.photo:hover img{transform:scale(1.035)}.photo span{position:absolute;right:16px;bottom:16px;padding:8px 13px;border-radius:99px;color:#fff;background:#183f32d9;font-size:13px}.copy{padding:clamp(28px,6vw,70px);align-self:center}.copy .kicker{color:var(--leaf);font-size:13px;font-weight:700;letter-spacing:.12em}.copy h3{margin:12px 0 18px;font:700 clamp(27px,4vw,42px)/1.2 serif;color:var(--forest)}.copy p:last-child{color:#68776f;line-height:1.9}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.category{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:15px;text-align:left;border:1px solid var(--line);padding:18px;background:#fffaf1;border-radius:16px;color:var(--forest);transition:.2s}.category:hover{transform:translateY(-2px);border-color:#91a591;box-shadow:0 10px 28px #183f3212}.icon{width:48px;height:48px;display:grid;place-items:center;border-radius:50%;color:#fff;background:var(--leaf);font-family:serif}.category strong,.category small{display:block}.category small{margin-top:4px;color:#7a877e}footer{padding:45px 24px;text-align:center;color:#e4ebe5;background:var(--forest)}footer p{margin:0 0 18px}footer a{display:inline-flex;align-items:center;gap:10px;color:#fff;font-weight:700;text-decoration:none;padding:11px 17px;border:1px solid #ffffff4a;border-radius:99px}footer a:hover{background:#fff;color:var(--forest)}.fb{width:23px;height:23px;display:grid;place-items:center;border-radius:50%;background:#1877f2;color:#fff;font:bold 19px Arial}.lightbox{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:28px;background:#07130ee8}.lightbox.open{display:grid}.lightbox img{max-width:min(94vw,900px);max-height:85vh;border-radius:12px;box-shadow:0 30px 80px #0008}.close{position:absolute;top:18px;right:22px;width:48px;height:48px;border:1px solid #ffffff55;border-radius:50%;color:#fff;background:#ffffff12;font-size:34px}.hint{position:absolute;bottom:10px;color:#dbe4dd;font-size:13px}@media(max-width:700px){.header{padding-top:38px}.mark{width:60px;height:60px;font-size:29px}.tools,.product{grid-template-columns:1fr}.tools{margin-bottom:48px}.photo{min-height:380px}.grid{grid-template-columns:1fr}.copy{padding:30px}}
  </style>
</head>
<body>
  <header class="header"><div class="mark">荃</div><div><p class="eyebrow">CHUAN FU GARDENING</p><h1>荃富園藝有限公司</h1><p class="tagline">專業園藝資材・陪你把日常種成風景</p></div></header>
  <section class="tools"><label><span class="label">客戶優惠代碼</span><span class="row"><input placeholder="輸入代碼查看您的優惠價"><button>套用</button></span></label><label><span class="label">搜尋商品</span><input placeholder="搜尋商品名稱，例如：火山石"></label></section>
  <section class="section"><div class="section-title"><p>NEW ARRIVAL</p><h2>最新產品</h2></div><article class="product"><button class="photo" id="photo" aria-label="放大查看豁去病殺菌原液照片"><img src="images/huoqubing.jpg" alt="豁去病（殺菌原液）"><span>點擊放大</span></button><div class="copy"><p class="kicker">園藝環境清潔</p><h3>豁去病（殺菌原液）</h3><p>商品詳情與優惠價格，歡迎透過 Facebook 與我們聯繫。</p></div></article></section>
  <section class="section"><div class="section-title"><p>SHOP BY CATEGORY</p><h2>商品分類</h2></div><div class="grid" id="grid"></div></section>
  <footer><p>商品資料陸續建置中，如需要的商品尚未上架，歡迎直接與我們聯繫。</p><a href="https://www.facebook.com/cfgardening" target="_blank" rel="noreferrer"><span class="fb">f</span>Facebook｜荃富園藝</a></footer>
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true"><button class="close" id="close" aria-label="關閉">×</button><img src="images/huoqubing.jpg" alt="豁去病（殺菌原液）放大照片"><p class="hint">點擊空白處或按 ESC 關閉</p></div>
  <script>
  const data=[["顆粒介質","1 項商品","土"],["非顆粒介質","即將上架","芽"],["圓形塑膠盆","即將上架","盆"],["非圓形塑膠盆","即將上架","器"],["肥料","2 項商品","肥"],["五金與其他周邊","即將上架","具"]];
  document.querySelector('#grid').innerHTML=data.map(x=>`<button class="category"><span class="icon">${x[2]}</span><span><strong>${x[0]}</strong><small>${x[1]}</small></span><span>→</span></button>`).join('');
  const box=document.querySelector('#lightbox');document.querySelector('#photo').onclick=()=>box.classList.add('open');document.querySelector('#close').onclick=()=>box.classList.remove('open');box.onclick=e=>{if(e.target===box)box.classList.remove('open')};addEventListener('keydown',e=>{if(e.key==='Escape')box.classList.remove('open')});
  </script>
</body></html>
