/* ========================================================= */

// ★ 訂單自動送出到 Google 試算表的網址(Apps Script 部署後的網址)
const ORDER_ENDPOINT = 'https://script.google.com/macros/s/AKfycbw8i1z3RXpotTavf_C4aa8oxJthL1tbq8bF5--3FLr3-kO0zQEEHP0dG9LtW5IqUXkhkw/exec';

let activeCategory = null; // null = 顯示分類總覽
let searchQuery = '';
let currentCode = null;
let pendingScrollProductId = null; // 從「最新產品」點進來時,要捲動並高亮的商品id
const cart = {}; // key: variantKey -> qty

function variantKey(productId, label){ return productId + '::' + label; }

function getVariantInfo(key){
  const [productId, label] = key.split('::');
  const product = PRODUCTS.find(p => p.id === productId);
  if(!product) return null;
  const variant = product.variants.find(v => v.label === label);
  if(!variant) return null;
  return { product, variant };
}

function currentPriceFor(variant){
  if(currentCode && variant.discounts && variant.discounts.hasOwnProperty(currentCode)){
    return variant.discounts[currentCode];
  }
  return variant.basePrice;
}

function countByCategory(catId){
  return PRODUCTS.filter(p => p.category === catId).length;
}

/* ---------- 分類總覽 ---------- */
function renderCategoryGrid(){
  const grid = document.getElementById('category-grid');
  grid.innerHTML = CATEGORIES.map(c => {
    const count = countByCategory(c.id);
    return `<button class="cat-card" data-cat="${c.id}">
      <h3>${c.name}</h3>
      <div class="count">${count > 0 ? count + ' 項商品' : '即將上架'}</div>
    </button>`;
  }).join('');
  grid.querySelectorAll('.cat-card').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      searchQuery = '';
      document.getElementById('search-input').value = '';
      render();
    });
  });
}

/* ---------- 最新產品專區(只在首頁顯示,僅照片+名稱) ---------- */
function renderFeaturedSection(showHomepage){
  const section = document.getElementById('featured-section');
  const listEl = document.getElementById('featured-list');

  if(!showHomepage){
    section.style.display = 'none';
    return;
  }

  // 取「最新加入」的商品:PRODUCTS 陣列裡越後面新增的越新,最多顯示6項,不足6項就全部顯示
  const featured = PRODUCTS.slice(-6);
  if(featured.length === 0){
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  listEl.innerHTML = featured.map(p => {
    const thumb = p.image ? `<img src="${p.image}" alt="${p.name}" data-full="${p.image}">` : '📦';
    return `
    <div class="featured-card" data-cat="${p.category}" data-product="${p.id}">
      <div class="featured-thumb">${thumb}</div>
      <div class="featured-name">${p.name}</div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.featured-thumb img').forEach(img => {
    img.addEventListener('click', (e) => {
      e.stopPropagation();
      openLightbox(img.dataset.full, img.alt);
    });
  });

  listEl.querySelectorAll('.featured-card').forEach(card => {
    card.addEventListener('click', () => {
      // 直接跳到該商品所在分類,並在渲染後捲動、高亮該商品,方便直接下單購買
      activeCategory = card.dataset.cat;
      searchQuery = '';
      document.getElementById('search-input').value = '';
      pendingScrollProductId = card.dataset.product;
      render();
    });
  });
}

/* ---------- 商品列表(分類或搜尋結果) ---------- */
function renderProductList(){
  const listEl = document.getElementById('product-list');
  const viewEl = document.getElementById('product-view');
  const titleEl = document.getElementById('view-title');
  const gridEl = document.getElementById('category-grid');

  const isSearching = searchQuery.trim() !== '';
  const showHomepage = !isSearching && !activeCategory;
  renderFeaturedSection(showHomepage);

  if(showHomepage){
    viewEl.style.display = 'none';
    gridEl.style.display = 'grid';
    return;
  }
  gridEl.style.display = 'none';
  viewEl.style.display = 'block';

  let items;
  if(isSearching){
    const q = searchQuery.trim().toLowerCase();
    items = PRODUCTS.filter(p => p.name.toLowerCase().includes(q));
    titleEl.textContent = `搜尋「${searchQuery.trim()}」的結果`;
  } else {
    items = PRODUCTS.filter(p => p.category === activeCategory);
    const cat = CATEGORIES.find(c => c.id === activeCategory);
    titleEl.textContent = cat ? cat.name : '';
  }

  if(items.length === 0){
    listEl.innerHTML = `<div class="empty-note">${isSearching ? '找不到符合的商品,換個關鍵字試試。' : '此分類商品陸續建置中,尚未上架。'}</div>`;
    return;
  }

  listEl.innerHTML = items.map(p => renderProductCard(p)).join('');
  attachListenersWithin(listEl);

  if(pendingScrollProductId){
    const targetId = pendingScrollProductId;
    pendingScrollProductId = null;
    const targetEl = document.getElementById('product-' + targetId);
    if(targetEl){
      setTimeout(() => {
        targetEl.scrollIntoView({ behavior:'smooth', block:'center' });
        targetEl.classList.add('highlight');
        setTimeout(() => targetEl.classList.remove('highlight'), 2200);
      }, 50);
    }
  }
}

function renderProductCard(product){
  const thumb = product.image
    ? `<img src="${product.image}" alt="${product.name}" data-full="${product.image}">`
    : '📦';
  const rows = product.variants.map(v => {
    const price = currentPriceFor(v);
    const discounted = price < v.basePrice;
    const key = variantKey(product.id, v.label);
    const qty = cart[key] || 0;
    return `
    <div class="variant-row" data-key="${key}">
      <div>
        <div class="variant-label">${v.label}</div>
        <div class="price-block">
          <span class="price-original mono ${discounted ? 'show' : ''}">NT$ ${v.basePrice}</span>
          <span class="price-current mono ${discounted ? 'discounted' : ''}">NT$ ${price}</span>
          <span class="unit-label">/ ${product.unit}</span>
        </div>
      </div>
      <div class="qty">
        <button type="button" class="qty-minus" data-key="${key}">−</button>
        <input type="text" inputmode="numeric" value="${qty}" data-key="${key}" class="qty-input">
        <button type="button" class="qty-plus" data-key="${key}">+</button>
      </div>
    </div>`;
  }).join('');

  const descHtml = product.description ? `<div class="product-desc">${product.description}</div>` : '';

  return `
  <div class="product-card" id="product-${product.id}">
    <div class="product-head">
      <div class="product-thumb">${thumb}</div>
      <div class="product-title-wrap">
        <div class="product-name">${product.name}</div>
        <div class="product-cat-tag">${CATEGORIES.find(c => c.id === product.category).name}</div>
      </div>
    </div>
    ${descHtml}
    ${rows}
  </div>`;
}

function attachListenersWithin(container){
  container.querySelectorAll('.qty-plus').forEach(btn => {
    btn.addEventListener('click', () => setQty(btn.dataset.key, (cart[btn.dataset.key] || 0) + 1));
  });
  container.querySelectorAll('.qty-minus').forEach(btn => {
    btn.addEventListener('click', () => setQty(btn.dataset.key, (cart[btn.dataset.key] || 0) - 1));
  });
  container.querySelectorAll('.qty-input').forEach(input => {
    input.addEventListener('input', () => setQty(input.dataset.key, input.value));
  });
  attachLightboxWithin(container);
}

/* ---------- 照片燈箱(點擊放大) ---------- */
function openLightbox(src, alt){
  const overlay = document.getElementById('lightbox-overlay');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  img.alt = alt || '';
  overlay.classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox-overlay').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-overlay').addEventListener('click', (e) => {
    if(e.target.id === 'lightbox-overlay') closeLightbox();
  });
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeLightbox();
});

function attachLightboxWithin(container){
  container.querySelectorAll('img[data-full]').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.dataset.full, img.alt));
  });
}

function setQty(key, val){
  val = Math.max(0, Math.min(999, Math.floor(Number(val) || 0)));
  if(val === 0){ delete cart[key]; } else { cart[key] = val; }
  render();
}

/* ---------- 折扣代碼 ---------- */
function applyCode(){
  const input = document.getElementById('discount-code');
  const statusEl = document.getElementById('code-status');
  const raw = input.value.trim().toUpperCase();
  input.value = raw;

  const allCodes = new Set();
  PRODUCTS.forEach(p => p.variants.forEach(v => {
    if(v.discounts) Object.keys(v.discounts).forEach(c => allCodes.add(c));
  }));

  if(raw === ''){
    currentCode = null;
    statusEl.textContent = '';
    statusEl.className = 'code-status';
  } else if(allCodes.has(raw)){
    currentCode = raw;
    statusEl.innerHTML = `優惠代碼 ${raw} 已套用<span class="savings-badge">部分商品價格已更新</span>`;
    statusEl.className = 'code-status ok';
  } else {
    currentCode = null;
    statusEl.textContent = '代碼無效,顯示原價';
    statusEl.className = 'code-status err';
  }
  render();
}

document.getElementById('apply-code').addEventListener('click', applyCode);
document.getElementById('discount-code').addEventListener('keydown', e => { if(e.key === 'Enter') applyCode(); });

/* ---------- 搜尋 ---------- */
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

/* ---------- 返回分類總覽 ---------- */
document.getElementById('back-btn').addEventListener('click', () => {
  activeCategory = null;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  render();
});

/* ---------- 購物車 / 結帳 ---------- */
function recomputeCart(){
  let grandTotal = 0;
  let itemCount = 0;
  let summaryHtml = '';

  Object.keys(cart).forEach(key => {
    const qty = cart[key];
    const info = getVariantInfo(key);
    if(!info || qty <= 0) return;
    const price = currentPriceFor(info.variant);
    const lineTotal = price * qty;
    grandTotal += lineTotal;
    itemCount += qty;
    summaryHtml += `<div class="summary-row"><span>${info.product.name}(${info.variant.label})× ${qty}</span><span class="mono">NT$${lineTotal.toLocaleString()}</span></div>`;
  });

  document.getElementById('summary-lines').innerHTML = summaryHtml || '<div class="summary-row"><span>尚未選購商品</span><span></span></div>';
  document.getElementById('grand-total').textContent = 'NT$ ' + grandTotal.toLocaleString();

  const hasItems = itemCount > 0;
  document.getElementById('cart-summary-card').style.display = hasItems ? 'block' : 'none';
  document.getElementById('checkout-card').style.display = hasItems ? 'block' : 'none';

  const cartBar = document.getElementById('cart-bar');
  cartBar.classList.toggle('show', hasItems);
  document.getElementById('cart-count').textContent = itemCount;
  document.getElementById('cart-total').textContent = 'NT$ ' + grandTotal.toLocaleString();

  if(!hasItems){
    document.getElementById('order-result').classList.remove('show');
  }

  return { grandTotal, itemCount };
}

document.getElementById('goto-checkout').addEventListener('click', () => {
  document.getElementById('checkout-card').scrollIntoView({ behavior:'smooth', block:'start' });
});

document.getElementById('submit-order').addEventListener('click', function(){
  const submitBtn = this;
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const address = document.getElementById('cust-address').value.trim();
  const note = document.getElementById('cust-note').value.trim();
  const errorEl = document.getElementById('form-error');
  const statusEl = document.getElementById('send-status');

  const { grandTotal } = recomputeCart();
  const entries = Object.keys(cart).filter(k => cart[k] > 0);

  if(!name || !phone || !address || entries.length === 0){
    errorEl.classList.add('show');
    return;
  }
  errorEl.classList.remove('show');

  let text = `【訂購單】\n`;
  text += currentCode ? `優惠代碼:${currentCode}\n` : `優惠代碼:未使用\n`;
  text += `--------------------\n`;
  entries.forEach(key => {
    const info = getVariantInfo(key);
    const qty = cart[key];
    const price = currentPriceFor(info.variant);
    text += `${info.product.name}(${info.variant.label}) ${qty} ${info.product.unit.replace(/^[0-9.]+\S*\s/, '') || '個'} × NT$${price} = NT$${(qty*price).toLocaleString()}\n`;
  });
  text += `--------------------\n`;
  text += `總金額:NT$${grandTotal.toLocaleString()}\n\n`;
  text += `姓名/公司:${name}\n`;
  text += `電話:${phone}\n`;
  text += `地址:${address}\n`;
  if(note) text += `備註:${note}\n`;

  document.getElementById('result-text').textContent = text;
  document.getElementById('order-result').classList.add('show');
  document.getElementById('order-result').scrollIntoView({ behavior:'smooth', block:'start' });

  // ★ 自動送出訂單到 Google 試算表
  submitBtn.disabled = true;
  statusEl.textContent = '訂單送出中…';
  statusEl.className = 'send-status pending';

  const payload = {
    discountCode: currentCode || '',
    orderText: text,
    total: grandTotal,
    name: name,
    phone: phone,
    address: address,
    note: note
  };

  fetch(ORDER_ENDPOINT, {
    method: 'POST',
    mode: 'no-cors', // Apps Script 網頁應用程式不支援讀取回應內容,但資料仍會送達
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    statusEl.textContent = '✓ 訂單已自動送出,我們會盡快與您聯繫!';
    statusEl.className = 'send-status ok';
    submitBtn.disabled = false;
  })
  .catch(() => {
    statusEl.textContent = '⚠ 自動送出失敗,請按下方「複製訂單內容」後傳給我們。';
    statusEl.className = 'send-status err';
    submitBtn.disabled = false;
  });
});

document.getElementById('copy-order').addEventListener('click', function(){
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    this.textContent = '已複製!';
    this.classList.add('copied');
    setTimeout(() => { this.textContent = '複製訂單內容(備用)'; this.classList.remove('copied'); }, 1800);
  });
});

/* ---------- 主渲染 ---------- */
function render(){
  renderProductList();
  recomputeCart();
}

renderCategoryGrid();
render();
</script>
