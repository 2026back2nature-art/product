<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>荃富園藝有限公司｜園藝資材</title>
  <meta name="description" content="荃富園藝有限公司最新園藝產品與資材。">
  <style>
    :root{--forest:#183f32;--leaf:#4f765d;--cream:#f5f2e9;--paper:#fffdf7;--ink:#20312a;--line:#d9ded4}
    *{box-sizing:border-box}html{background:var(--cream);scroll-behavior:smooth}body{margin:0;color:var(--ink);background:radial-gradient(circle at 10% 5%,#dfe9d9 0,transparent 26rem),var(--cream);font-family:"Microsoft JhengHei",sans-serif}button{font:inherit;cursor:pointer}
    .header{max-width:1080px;margin:auto;padding:54px 24px 38px;display:flex;align-items:center;gap:22px}.logo{width:92px;height:92px;flex:none;border-radius:50%;object-fit:cover;box-shadow:0 10px 26px #183f3233}.eyebrow,.section-title p{margin:0 0 6px;letter-spacing:.2em;color:var(--leaf);font-size:12px;font-weight:700}h1{margin:0;color:var(--forest);font:700 clamp(30px,5vw,52px)/1.15 serif;letter-spacing:.05em}.tagline{margin:10px 0 0;color:#597066}
    .section{max-width:1080px;margin:0 auto 72px;padding:0 24px}.section-title{margin-bottom:22px}.section-title h2{margin:0;color:var(--forest);font:700 32px/1.2 serif}.products{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}.product{background:var(--paper);border:1px solid #e4e5dd;border-radius:20px;overflow:hidden;box-shadow:0 14px 34px #183f3210}.photo{position:relative;width:100%;aspect-ratio:4/3;border:0;padding:0;background:#e5e4dc;overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease}.photo:hover img,.photo:focus-visible img{transform:scale(1.04)}.photo span{position:absolute;right:10px;bottom:10px;padding:6px 10px;border-radius:99px;color:#fff;background:#183f32d9;font-size:12px}.copy{padding:18px}.copy .kicker{margin:0;color:var(--leaf);font-size:12px;font-weight:700;letter-spacing:.1em}.copy h3{margin:8px 0 0;color:var(--forest);font:700 21px/1.35 serif}.copy p:last-child{margin:8px 0 0;color:#68776f;line-height:1.65;font-size:14px}.categories{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.category{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:15px;text-align:left;border:1px solid var(--line);padding:18px;background:#fffaf1;border-radius:16px;color:var(--forest);transition:.2s}.category:hover{transform:translateY(-2px);border-color:#91a591;box-shadow:0 10px 28px #183f3212}.category-icon{width:48px;height:48px;display:grid;place-items:center;border-radius:50%;color:#fff;background:var(--leaf);font-family:serif}.category strong,.category small{display:block}.category small{margin-top:4px;color:#7a877e}
    footer{padding:45px 24px;text-align:center;color:#e4ebe5;background:var(--forest)}footer p{margin:0 0 18px}footer a{display:inline-flex;align-items:center;gap:10px;color:#fff;font-weight:700;text-decoration:none;padding:11px 17px;border:1px solid #ffffff4a;border-radius:99px}footer a:hover{background:#fff;color:var(--forest)}.fb{width:23px;height:23px;display:grid;place-items:center;border-radius:50%;background:#1877f2;color:#fff;font:bold 19px Arial}
    .lightbox{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:28px;background:#07130ee8;backdrop-filter:blur(8px)}.lightbox.open{display:grid}.lightbox img{max-width:min(94vw,1000px);max-height:85vh;border-radius:12px;box-shadow:0 30px 80px #0008}.close{position:absolute;top:18px;right:22px;width:48px;height:48px;border:1px solid #ffffff55;border-radius:50%;color:#fff;background:#ffffff12;font-size:34px;line-height:1}.hint{position:absolute;bottom:10px;color:#dbe4dd;font-size:13px}
    @media(max-width:760px){.header{padding-top:34px}.logo{width:72px;height:72px}.products,.categories{grid-template-columns:1fr}.section{margin-bottom:52px}}@media(min-width:761px) and (max-width:980px){.products{grid-template-columns:repeat(2,1fr)}}
  </style>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="產品照片放大檢視"><button class="close" id="close" aria-label="關閉放大圖片">×</button><img id="largeImage" src="images/huoqubing.jpg" alt="放大的產品照片"><p class="hint">點擊背景或按 ESC 關閉</p></div>
  <script>
    const products=[
      {name:'豁去病殺菌原液',tag:'園藝養護新品',desc:'點擊照片可放大查看產品細節。'}
    ];
    const categories=[['顆粒介質','1 項商品','土'],['非顆粒介質','即將上架','芽'],['圓形塑膠盆','即將上架','盆'],['非圓形塑膠盆','即將上架','器'],['肥料','2 項商品','肥'],['五金與其他周邊','即將上架','具']];
    const grid=document.querySelector('#products');
    grid.innerHTML=products.map((p,i)=>`<article class="product"><button class="photo" type="button" aria-label="放大查看${p.name}照片" data-image="images/huoqubing.jpg"><img src="images/huoqubing.jpg" alt="${p.name}縮圖"><span>點擊放大</span></button><div class="copy"><p class="kicker">${p.tag}</p><h3>${p.name}</h3><p>${p.desc}</p></div></article>`).join('');
    document.querySelector('#categories').innerHTML=categories.map(c=>`<button class="category" type="button"><span class="category-icon">${c[2]}</span><span><strong>${c[0]}</strong><small>${c[1]}</small></span><span aria-hidden="true">→</span></button>`).join('');
    const box=document.querySelector('#lightbox'),large=document.querySelector('#largeImage');
    grid.addEventListener('click',e=>{const b=e.target.closest('.photo');if(!b)return;large.src=b.dataset.image;large.alt=b.querySelector('img').alt.replace('縮圖','放大照片');box.classList.add('open');document.querySelector('#close').focus()});
    const close=()=>box.classList.remove('open');document.querySelector('#close').onclick=close;box.onclick=e=>{if(e.target===box)close()};addEventListener('keydown',e=>{if(e.key==='Escape')close()});
  </script>
</body>
</html>
